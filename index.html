<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Es de Amigos 💜</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#f3d1ff,#ffc9f5,#e0b3ff);
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
    max-width:500px;
}

h1{
    color:white;
    font-weight:500;
    opacity:0.8;
    font-size:1.4rem;
}

#lyrics{
    margin-top:30px;
    font-size:1.6rem;
    font-weight:600;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,0.9);
    line-height:1.9;
    display:none;
}

.word{
    opacity:0.3;
    transition: all 0.4s ease;
}

.active{
    color:#ff3ecf;
    opacity:1;
    text-shadow:0 0 25px #ff3ecf;
    transform:scale(1.05);
}

#startBtn{
    padding:18px 50px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff4fd8,#c850ff);
    color:white;
    font-size:1.2rem;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,0,200,0.6);
}

.heart{
    position:absolute;
    bottom:-20px;
    font-size:22px;
    animation: floatUp linear infinite;
    opacity:0.5;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(0.8); opacity:0.6;}
    100%{transform:translateY(-110vh) scale(1.2); opacity:0;}
}
</style>
</head>
<body>

<div class="container">
    <h1>No Es de Amigos 🎶</h1>
    <button id="startBtn">Reproducir 🎵</button>
    <div id="lyrics"></div>
</div>

<audio id="audio" src="cancion.mp3"></audio>

<script>
const audio=document.getElementById("audio");
const lyricsDiv=document.getElementById("lyrics");
const startBtn=document.getElementById("startBtn");

// Restando 0.2 segundos más a todos los tiempos (un poquito más rápido)
const letra = [
{tiempo:-0.3, palabra:"La"},
{tiempo:0.3, palabra:"neta,"},
{tiempo:1.0, palabra:"qué"},
{tiempo:1.6, palabra:"bien"},
{tiempo:2.2, palabra:"te"},
{tiempo:2.8, palabra:"ves"},
{tiempo:3.5, palabra:"conmigo"},
{tiempo:4.3, palabra:"Tú"},
{tiempo:4.9, palabra:"y"},
{tiempo:5.2, palabra:"yo"},
{tiempo:5.6, palabra:"sabemos,"},
{tiempo:6.2, palabra:"lo"},
{tiempo:6.7, palabra:"que"},
{tiempo:7.2, palabra:"hacemos"},
{tiempo:7.8, palabra:"no"},
{tiempo:8.3, palabra:"es"},
{tiempo:8.8, palabra:"de"},
{tiempo:9.3, palabra:"amigos"},
{tiempo:10.0, palabra:"Cuando"},
{tiempo:10.6, palabra:"prendemos"},
{tiempo:11.3, palabra:"te"},
{tiempo:11.8, palabra:"quedas"},
{tiempo:12.4, palabra:"otro"},
{tiempo:13.0, palabra:"ratito"},
{tiempo:13.7, palabra:"Quédate"},
{tiempo:14.4, palabra:"conmigo"},
{tiempo:15.0, palabra:"hasta"},
{tiempo:15.6, palabra:"que"},
{tiempo:16.1, palabra:"yo"},
{tiempo:16.6, palabra:"me"},
{tiempo:17.1, palabra:"haga"},
{tiempo:17.6, palabra:"viejito"},
{tiempo:18.3, palabra:"En"},
{tiempo:18.9, palabra:"la"},
{tiempo:19.4, palabra:"mañana"},
{tiempo:20.1, palabra:"que"},
{tiempo:20.7, palabra:"me"},
{tiempo:21.3, palabra:"prendo"},
{tiempo:22.0, palabra:"el"},
{tiempo:22.6, palabra:"primer"},
{tiempo:23.2, palabra:"blunt"},
{tiempo:23.9, palabra:"Acostado"},
{tiempo:24.7, palabra:"contigo,"},
{tiempo:25.3, palabra:"le"},
{tiempo:25.8, palabra:"dimos"},
{tiempo:26.5, palabra:"un"},
{tiempo:27.1, palabra:"jalón"},
{tiempo:27.9, palabra:"Encerrados"},
{tiempo:28.7, palabra:"juntitos"},
{tiempo:29.3, palabra:"aquí"},
{tiempo:29.9, palabra:"en"},
{tiempo:30.4, palabra:"la"},
{tiempo:31.0, palabra:"habitación"},
{tiempo:31.8, palabra:"Mi"},
{tiempo:32.3, palabra:"niña"},
{tiempo:32.9, palabra:"bonita,"},
{tiempo:33.7, palabra:"me"},
{tiempo:34.3, palabra:"alteras"},
{tiempo:35.0, palabra:"el"},
{tiempo:35.7, palabra:"corazón"}
];

function renderLyrics(){
lyricsDiv.innerHTML="";
letra.forEach((item,index)=>{
const span=document.createElement("span");
span.textContent=item.palabra+" ";
span.classList.add("word");
span.id="word-"+index;
lyricsDiv.appendChild(span);
});
}

startBtn.addEventListener("click",()=>{
audio.play().then(()=>{
startBtn.style.display="none";
lyricsDiv.style.display="block";
renderLyrics();
startHearts();
}).catch(()=>{
alert("Pon el archivo cancion.mp3 en la misma carpeta.");
});
});

audio.addEventListener("timeupdate",()=>{
const currentTime=audio.currentTime;
letra.forEach((item,index)=>{
const next=letra[index+1];
if(currentTime>=item.tiempo && (!next || currentTime<next.tiempo)){
document.querySelectorAll(".word").forEach(w=>w.classList.remove("active"));
document.getElementById("word-"+index).classList.add("active");
}
});
});

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*15)+"px";
heart.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},8000);
}

function startHearts(){
setInterval(createHeart,1000);
}
</script>

</body>
</html>
